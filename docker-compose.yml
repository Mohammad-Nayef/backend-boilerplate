services:
  fastapi:
    build: .
    ports:
      - "8000:80"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DB_HOST=db
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: boilerplate_db
    ports:
      - "5432:5432"

volumes:
  postgres_data:
